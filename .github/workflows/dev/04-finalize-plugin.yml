name: "04 · Finalize Plugin"

# Triggered when a status/candidate PR is merged to main.
# Promotes drafts/{plugin}/ → plugins/{plugin}/ and regenerates marketplace manifests.

on:
  workflow_dispatch:
    inputs:
      plugin:
        description: "plugin to finalize (e.g. terraformer)"
        required: true
        default: "terraformer"
      pr_number:
        description: "Candidate PR number to finalize (leave blank to auto-detect)"
        required: false
        default: ""
      bump_type:
        description: "Version bump type: auto | major | minor | patch"
        required: false
        default: "auto"
  # Auto-trigger when a status/candidate PR is merged to main
  pull_request:
    types: [closed]
    branches: [main]

concurrency:
  group: finalize-${{ github.ref }}
  cancel-in-progress: false

# Deny all permissions at the workflow level; each job declares its minimum.
permissions: {}

jobs:
  check-trigger:
    name: Check trigger
    runs-on: ubuntu-latest
    # For pull_request: only run when the PR was actually merged
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event_name == 'pull_request' && github.event.pull_request.merged == true) }}
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
      plugin:     ${{ steps.check.outputs.plugin }}
      pr_number:  ${{ steps.check.outputs.pr_number }}
    steps:
      - id: check
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
            echo "plugin=${{ inputs.plugin }}" >> $GITHUB_OUTPUT
            echo "pr_number=${{ inputs.pr_number }}" >> $GITHUB_OUTPUT

          elif [ "${{ github.event_name }}" = "pull_request" ] && \
               [ "${{ github.event.pull_request.merged }}" = "true" ]; then

            # Check if the merged PR has status/candidate label
            HAS_CANDIDATE=$(echo '${{ toJson(github.event.pull_request.labels) }}' \
              | jq -r 'map(select(.name == "status/candidate")) | length | if . > 0 then "true" else "false" end')
            plugin=$(echo '${{ toJson(github.event.pull_request.labels) }}' \
              | jq -r '[.[] | select(.name | startswith("plugin/")) | .name | split("/")[1]] | first // ""')
            if [ "$HAS_CANDIDATE" = "true" ] && [ -n "$plugin" ]; then
              echo "should_run=true" >> $GITHUB_OUTPUT
              echo "plugin=$plugin" >> $GITHUB_OUTPUT
              echo "pr_number=${{ github.event.pull_request.number }}" >> $GITHUB_OUTPUT
            else
              echo "should_run=false" >> $GITHUB_OUTPUT
              echo "plugin=" >> $GITHUB_OUTPUT
              echo "pr_number=" >> $GITHUB_OUTPUT
            fi
          else
            echo "should_run=false" >> $GITHUB_OUTPUT
            echo "plugin=" >> $GITHUB_OUTPUT
            echo "pr_number=" >> $GITHUB_OUTPUT
          fi

  finalize:
    name: Finalize plugin for ${{ needs.check-trigger.outputs.plugin }}
    needs: check-trigger
    if: needs.check-trigger.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Resolve candidate PR branch
        id: resolve-pr
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          plugin: ${{ needs.check-trigger.outputs.plugin }}
          INPUT_PR: ${{ needs.check-trigger.outputs.pr_number }}
        run: |
          if [ -n "$INPUT_PR" ]; then
            PR_NUMBER="$INPUT_PR"
          else
            PR_NUMBER=$(gh pr list \
              --label "plugin/${plugin}" \
              --label "status/candidate" \
              --state open \
              --json number \
              --jq '.[0].number' \
              --repo "${{ github.repository }}" 2>/dev/null)
          fi
          if [ -z "$PR_NUMBER" ]; then
            echo "[error] No candidate PR found for plugin '${plugin}'"
            exit 1
          fi
          BRANCH=$(gh pr view "$PR_NUMBER" --json headRefName --jq '.headRefName' \
            --repo "${{ github.repository }}")
          echo "pr_number=$PR_NUMBER" >> $GITHUB_OUTPUT
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT
          echo "Resolved candidate PR #$PR_NUMBER on branch $BRANCH"

      - name: Check out the candidate branch content
        env:
          BRANCH: ${{ steps.resolve-pr.outputs.branch }}
          plugin: ${{ needs.check-trigger.outputs.plugin }}
        run: |
          git fetch origin "$BRANCH"
          # Copy draft files from the candidate branch
          git checkout "origin/$BRANCH" -- "drafts/${plugin}/" 2>/dev/null || true

      - name: Bump version and generate changelog
        env:
          plugin: ${{ needs.check-trigger.outputs.plugin }}
          BUMP_TYPE: ${{ inputs.bump_type || 'auto' }}
        run: |
          python3 scripts/finalize.py --plugin "${plugin}" --step version

      - name: Promote draft to plugins/
        env:
          plugin: ${{ needs.check-trigger.outputs.plugin }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          python3 scripts/finalize.py --plugin "${plugin}" --step promote

      - name: Update marketplace manifests
        env:
          plugin: ${{ needs.check-trigger.outputs.plugin }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          python3 scripts/finalize.py --plugin "${plugin}" --step marketplace

      - name: Commit and push finalization
        id: finalize-commit
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          plugin: ${{ needs.check-trigger.outputs.plugin }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          BRANCH="finalize/${plugin}-$(date +%Y%m%d%H%M%S)"
          git checkout -b "$BRANCH"
          git add "plugins/${plugin}/" ".github/plugin/marketplace.json" ".claude-plugin/marketplace.json" "sources/plugins.json"
          # Remove draft directory
          git rm -r "drafts/${plugin}/" 2>/dev/null || true
          PLUGIN_VERSION=$(python3 -c "import json; print(json.load(open('plugins/${plugin}/plugin.json')).get('version','0.1.0'))")
          git commit -m "chore(finalize): promote ${plugin} to plugins/ [skip ci]"
          git push origin "$BRANCH"
          echo "finalize_branch=$BRANCH" >> $GITHUB_OUTPUT
          echo "plugin_version=$PLUGIN_VERSION" >> $GITHUB_OUTPUT

      - name: Open finalization PR
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          plugin: ${{ needs.check-trigger.outputs.plugin }}
          CANDIDATE_PR: ${{ steps.resolve-pr.outputs.pr_number }}
        run: |
          VERSION="${{ steps.finalize-commit.outputs.plugin_version }}"
          BRANCH="${{ steps.finalize-commit.outputs.finalize_branch }}"

          {
            echo "## Plugin release: \`${plugin}\` v${VERSION}"
            echo ""
            echo "This PR finalizes the \`${plugin}\` plugin and adds it to the veiled-market marketplace."
            echo ""
            echo "**Closes:** #${CANDIDATE_PR}"
            echo ""
            echo "### Changes"
            echo "- \`plugins/${plugin}/\` — finalized plugin directory"
            echo "- \`.github/plugin/marketplace.json\` — updated Copilot CLI marketplace"
            echo "- \`.claude-plugin/marketplace.json\` — updated Claude Code marketplace"
            echo "- \`drafts/${plugin}/\` — removed (promoted to plugins/)"
            echo ""
            echo "### Installation (after merge)"
            echo "**GitHub Copilot CLI:**"
            echo '```bash'
            echo "copilot plugin marketplace add LederWorks/veiled-market"
            echo "copilot plugin install ${plugin}@veiled-market"
            echo '```'
            echo ""
            echo "**Claude Code:**"
            echo '```bash'
            echo "/plugin marketplace add LederWorks/veiled-market"
            echo "/plugin install ${plugin}@veiled-market"
            echo '```'
            echo ""
            echo "### Review checklist"
            echo "- [ ] Plugin files are correct and complete"
            echo "- [ ] Marketplace manifests are updated"
            echo "- [ ] Version number is appropriate"
            echo "- [ ] No sensitive data or secrets included"
          } > /tmp/release-body.md

          gh pr create \
            --title "🚀 Release: ${plugin} plugin v${VERSION}" \
            --body-file /tmp/release-body.md \
            --label "plugin/${plugin}" \
            --label "status/finalized" \
            --label "type/plugin" \
            --base main \
            --head "$BRANCH"

      - name: Close candidate PR
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CANDIDATE_PR: ${{ steps.resolve-pr.outputs.pr_number }}
        run: |
          gh pr comment "$CANDIDATE_PR" \
            --body "🚀 This candidate has been finalized and promoted to \`plugins/\`. A release PR has been opened. Closing this candidate." \
            --repo "${{ github.repository }}" 2>/dev/null || true
          gh pr close "$CANDIDATE_PR" --repo "${{ github.repository }}" 2>/dev/null || true

      - name: Update plugin issues to finalized
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          plugin: ${{ needs.check-trigger.outputs.plugin }}
        run: |
          # Close all discovery issues for this plugin
          gh issue list \
            --label "plugin/${plugin}" \
            --label "status/draft" \
            --state open \
            --json number \
            --jq '.[].number' \
            --repo "${{ github.repository }}" \
          | while read N; do
            gh issue edit "$N" \
              --remove-label "status/draft" \
              --add-label "status/finalized" \
              --repo "${{ github.repository }}" 2>/dev/null || true
          done

      - name: Summary
        run: |
          echo "## Plugin finalized 🚀" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "plugin: \`${{ needs.check-trigger.outputs.plugin }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "The plugin has been promoted to \`plugins/${{ needs.check-trigger.outputs.plugin }}/\` and the marketplace manifests have been updated." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Review and merge the release PR to publish the plugin." >> $GITHUB_STEP_SUMMARY
