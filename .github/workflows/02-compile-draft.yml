name: "02 · Compile Plugin Draft"

on:
  workflow_dispatch:
    inputs:
      expertise:
        description: "Expertise to compile a draft for (e.g. terraformer)"
        required: true
        default: "terraformer"
      dry_run:
        description: "Dry run (print actions, do not create PR)"
        type: boolean
        required: false
        default: false
  # Trigger automatically when a discovery issue is labeled status/draft
  issues:
    types: [labeled]

permissions:
  issues: write
  contents: write
  pull-requests: write

jobs:
  # Only run the auto-trigger path when the label is 'status/draft'
  check-trigger:
    name: Check trigger
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
      expertise: ${{ steps.check.outputs.expertise }}
    steps:
      - id: check
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
            echo "expertise=${{ inputs.expertise }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.event_name }}" = "issues" ] && \
               [ "${{ github.event.label.name }}" = "status/draft" ]; then
            # Extract expertise from issue labels using jq
            EXPERTISE=$(echo '${{ toJson(github.event.issue.labels) }}' \
              | jq -r '[.[] | select(.name | startswith("expertise/")) | .name | split("/")[1]] | first // ""')
            if [ -n "$EXPERTISE" ]; then
              echo "should_run=true" >> $GITHUB_OUTPUT
              echo "expertise=$EXPERTISE" >> $GITHUB_OUTPUT
            else
              echo "should_run=false" >> $GITHUB_OUTPUT
              echo "expertise=" >> $GITHUB_OUTPUT
            fi
          else
            echo "should_run=false" >> $GITHUB_OUTPUT
            echo "expertise=" >> $GITHUB_OUTPUT
          fi

  compile:
    name: Compile draft for ${{ needs.check-trigger.outputs.expertise }}
    needs: check-trigger
    if: needs.check-trigger.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Evaluate discoveries and compile draft
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          EXPERTISE="${{ needs.check-trigger.outputs.expertise }}"
          DRY_RUN_FLAG=""
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            DRY_RUN_FLAG="--dry-run"
          fi
          python3 scripts/evaluate.py \
            --expertise "$EXPERTISE" \
            --output "drafts/${EXPERTISE}" \
            $DRY_RUN_FLAG

      - name: Check if draft was created
        id: draft-check
        run: |
          EXPERTISE="${{ needs.check-trigger.outputs.expertise }}"
          if [ -f "drafts/${EXPERTISE}/plugin.json" ]; then
            echo "draft_exists=true" >> $GITHUB_OUTPUT
          else
            echo "draft_exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit and open draft PR
        if: steps.draft-check.outputs.draft_exists == 'true' && inputs.dry_run != 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EXPERTISE: ${{ needs.check-trigger.outputs.expertise }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          BRANCH="draft/${EXPERTISE}-$(date +%Y%m%d%H%M%S)"
          git checkout -b "$BRANCH"
          git add "drafts/${EXPERTISE}/"
          git commit -m "feat(draft): compiled ${EXPERTISE} plugin draft [ai/draft]" || exit 0
          git push origin "$BRANCH"

          {
            echo "## Auto-compiled draft plugin for \`${EXPERTISE}\`"
            echo ""
            echo "This PR was automatically generated by the [02 · Compile Plugin Draft](.github/workflows/02-compile-draft.yml) workflow."
            echo ""
            echo "### Contents"
            echo "- \`drafts/${EXPERTISE}/plugin.json\` — plugin manifest"
            echo "- \`drafts/${EXPERTISE}/skills/\` — compiled skill files"
            echo "- \`drafts/${EXPERTISE}/agents/\` — compiled agent files"
            echo "- \`drafts/${EXPERTISE}/ENRICHMENT_NOTES.md\` — AI enrichment notes"
            echo ""
            echo "### Next steps"
            echo "1. Review the generated draft for accuracy and completeness."
            echo "2. The **03 · Evaluate & Enrich** workflow will compare this draft against others and produce a final candidate."
            echo "3. Approve the candidate PR to trigger **04 · Finalize Plugin**."
            echo ""
            echo "### Labels"
            echo "This PR is labeled with:"
            echo "- \`expertise/${EXPERTISE}\`"
            echo "- \`status/draft\`"
            echo "- \`ai/draft\`"
          } > /tmp/pr-body.md

          gh pr create \
            --title "🧪 Draft: ${EXPERTISE} plugin (AI-compiled)" \
            --body-file /tmp/pr-body.md \
            --label "expertise/${EXPERTISE}" \
            --label "status/draft" \
            --label "ai/draft" \
            --base main \
            --head "$BRANCH" \
            --draft

      - name: Summary
        run: |
          echo "## Draft compilation complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Expertise: \`${{ needs.check-trigger.outputs.expertise }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Check the [Pull Requests tab](https://github.com/${{ github.repository }}/pulls?q=label%3Astatus%2Fdraft) for the newly created draft PR." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Next step: run the **03 · Evaluate & Enrich** workflow after multiple drafts exist." >> $GITHUB_STEP_SUMMARY
