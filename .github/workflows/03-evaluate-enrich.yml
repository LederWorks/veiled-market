name: "03 · Evaluate & Enrich Drafts"

on:
  workflow_dispatch:
    inputs:
      expertise:
        description: "Expertise to evaluate drafts for (e.g. terraformer)"
        required: true
        default: "terraformer"
      dry_run:
        description: "Dry run (print actions, do not modify PRs)"
        type: boolean
        required: false
        default: false
  # Auto-trigger when a PR is labeled status/draft
  pull_request:
    types: [labeled]

permissions:
  issues: write
  contents: write
  pull-requests: write

jobs:
  check-trigger:
    name: Check trigger
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
      expertise: ${{ steps.check.outputs.expertise }}
    steps:
      - id: check
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
            echo "expertise=${{ inputs.expertise }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.event_name }}" = "pull_request" ] && \
               [ "${{ github.event.label.name }}" = "status/draft" ]; then
            EXPERTISE=$(echo '${{ toJson(github.event.pull_request.labels) }}' \
              | jq -r '[.[] | select(.name | startswith("expertise/")) | .name | split("/")[1]] | first // ""')
            if [ -n "$EXPERTISE" ]; then
              echo "should_run=true" >> $GITHUB_OUTPUT
              echo "expertise=$EXPERTISE" >> $GITHUB_OUTPUT
            else
              echo "should_run=false" >> $GITHUB_OUTPUT
              echo "expertise=" >> $GITHUB_OUTPUT
            fi
          else
            echo "should_run=false" >> $GITHUB_OUTPUT
            echo "expertise=" >> $GITHUB_OUTPUT
          fi

  evaluate-and-enrich:
    name: Evaluate & enrich drafts for ${{ needs.check-trigger.outputs.expertise }}
    needs: check-trigger
    if: needs.check-trigger.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Find all draft PRs for this expertise
        id: find-drafts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EXPERTISE: ${{ needs.check-trigger.outputs.expertise }}
        run: |
          DRAFTS=$(gh pr list \
            --label "expertise/${EXPERTISE}" \
            --label "status/draft" \
            --state open \
            --json number,headRefName,title \
            --repo "${{ github.repository }}")
          echo "drafts<<EOF" >> $GITHUB_OUTPUT
          echo "$DRAFTS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          COUNT=$(echo "$DRAFTS" | python3 -c "import json,sys; print(len(json.load(sys.stdin)))")
          echo "count=$COUNT" >> $GITHUB_OUTPUT
          echo "Found $COUNT draft PRs for expertise '${EXPERTISE}'"

      - name: Check out and merge all draft branches
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EXPERTISE: ${{ needs.check-trigger.outputs.expertise }}
        run: |
          DRAFT_BRANCHES=$(echo '${{ steps.find-drafts.outputs.drafts }}' \
            | jq -r '.[].headRefName')
          mkdir -p /tmp/all-drafts
          INDEX=0
          for BRANCH in $DRAFT_BRANCHES; do
            git fetch origin "$BRANCH" 2>/dev/null || continue
            git checkout "origin/$BRANCH" -- "drafts/${EXPERTISE}/" 2>/dev/null || true
            if [ -d "drafts/${EXPERTISE}" ]; then
              cp -r "drafts/${EXPERTISE}" "/tmp/all-drafts/draft-${INDEX}"
              INDEX=$((INDEX + 1))
            fi
            git checkout HEAD -- . 2>/dev/null || true
          done
          echo "Collected $INDEX draft plugin directories"
          ls /tmp/all-drafts/ 2>/dev/null || echo "(none)"

      - name: AI enrichment — pick best + enrich from others
        id: enrich
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EXPERTISE: ${{ needs.check-trigger.outputs.expertise }}
        run: |
          python3 scripts/enrich.py

      - name: Create candidate PR
        if: inputs.dry_run != 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EXPERTISE: ${{ needs.check-trigger.outputs.expertise }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          BRANCH="candidate/${EXPERTISE}-$(date +%Y%m%d%H%M%S)"
          git checkout -b "$BRANCH"
          git add "drafts/${EXPERTISE}/"
          git commit -m "feat(candidate): enriched ${EXPERTISE} plugin [ai/evaluation]" || exit 0
          git push origin "$BRANCH"

          # Close all draft PRs with a comment
          DRAFT_NUMBERS=$(echo '${{ steps.find-drafts.outputs.drafts }}' \
            | jq -r '.[].number')
          for N in $DRAFT_NUMBERS; do
            gh pr comment "$N" \
              --body "🤖 This draft has been evaluated and superseded by the enriched candidate PR. Closing." \
              --repo "${{ github.repository }}" 2>/dev/null || true
            gh pr close "$N" --repo "${{ github.repository }}" 2>/dev/null || true
          done

          DRAFT_COUNT=$(echo '${{ steps.find-drafts.outputs.drafts }}' \
            | jq 'length')

          {
            echo "## Enriched candidate plugin for \`${EXPERTISE}\`"
            echo ""
            echo "This PR was automatically generated by the [03 · Evaluate & Enrich](.github/workflows/03-evaluate-enrich.yml) workflow."
            echo ""
            echo "It consolidates **${DRAFT_COUNT} draft PR(s)** into a single enriched plugin."
            echo ""
            echo "### What happened"
            echo "1. All \`status/draft\` PRs for \`${EXPERTISE}\` were collected."
            echo "2. AI evaluated each draft for relevance, quality, completeness, and platform fit."
            echo "3. The best base was selected and enriched with unique features from the others."
            echo "4. Draft PRs were closed."
            echo ""
            echo "### Next steps"
            echo "1. Review \`drafts/${EXPERTISE}/plugin.json\` and the skill/agent files."
            echo "2. Approve and merge this PR to trigger **04 · Finalize Plugin**, which promotes the plugin to \`plugins/${EXPERTISE}/\` and updates the marketplace manifests."
            echo ""
            echo "### Review checklist"
            echo "- [ ] Plugin name and description are accurate"
            echo "- [ ] Skills cover the key use cases for \`${EXPERTISE}\`"
            echo "- [ ] Agent system prompt is correct and safe"
            echo "- [ ] Keywords and tags are appropriate"
            echo "- [ ] No sensitive data or secrets in the plugin files"
          } > /tmp/candidate-body.md

          gh pr create \
            --title "✨ Candidate: ${EXPERTISE} plugin (enriched from ${DRAFT_COUNT} drafts)" \
            --body-file /tmp/candidate-body.md \
            --label "expertise/${EXPERTISE}" \
            --label "status/candidate" \
            --label "ai/evaluation" \
            --base main \
            --head "$BRANCH"

      - name: Summary
        run: |
          echo "## Evaluation & enrichment complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Expertise: \`${{ needs.check-trigger.outputs.expertise }}\`" >> $GITHUB_STEP_SUMMARY
          echo "Drafts processed: ${{ steps.find-drafts.outputs.count }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Check the [Pull Requests tab](https://github.com/${{ github.repository }}/pulls?q=label%3Astatus%2Fcandidate) for the candidate PR." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Next step: review and approve the candidate PR to trigger **04 · Finalize Plugin**." >> $GITHUB_STEP_SUMMARY
