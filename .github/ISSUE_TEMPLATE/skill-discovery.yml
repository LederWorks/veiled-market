name: "🔍 Skill Discovery"
description: "Report a discovered skill, agent, hook, or plugin resource for a specific plugin"
title: "[discovery] {plugin}: {resource-name}"
labels:
  - "status/discovered"
  - "ai/discovery"
body:
  - type: dropdown
    id: plugin
    attributes:
      label: plugin
      description: Which plugin does this resource belong to?
      options:
        - terraformer
        - kubernetes
        - ansible
        - docker
        - github-actions
        - python
        - nodejs
        - go
        - rust
        - security
        - other
    validations:
      required: true

  - type: dropdown
    id: resource-type
    attributes:
      label: Resource type
      description: What type of resource is this?
      options:
        - skill (SKILL.md)
        - agent (.agent.md)
        - hook (hooks.json)
        - plugin (plugin.json + components)
        - mcp-server (.mcp.json)
        - instruction (system prompt / CLAUDE.md)
    validations:
      required: true

  - type: input
    id: source-url
    attributes:
      label: Source URL
      description: Where was this resource found?
      placeholder: "https://skillsmp.com/skills/terraform-plan"
    validations:
      required: true

  - type: dropdown
    id: source-marketplace
    attributes:
      label: Source marketplace
      options:
        - github/copilot-plugins
        - awesome-copilot
        - skillsmp.com
        - agenticskills.org
        - openskills.app
        - openagentskills.dev
        - agentskills.to
        - antigravityskills.org
        - skills.sh
        - buildwithclaude.com
        - claude-plugins.dev
        - mcpmarket.com
        - agentskills.io
        - GitHub (other)
        - Other
    validations:
      required: true

  - type: dropdown
    id: ai-platform
    attributes:
      label: Target AI platform
      description: Which AI CLI tool does this resource target?
      multiple: true
      options:
        - GitHub Copilot CLI
        - Claude Code
        - OpenAI Codex CLI
        - Google Gemini CLI
        - Cursor
        - Universal / Cross-platform
    validations:
      required: true

  - type: checkboxes
    id: languages
    attributes:
      label: Languages / technologies
      description: "Which languages or technologies does this resource use? (adds `lang/` labels)"
      options:
        - label: "`lang/bash` — Shell / Bash scripting"
        - label: "`lang/powershell` — PowerShell scripting"
        - label: "`lang/hcl` — HashiCorp Configuration Language"
        - label: "`lang/python` — Python"
        - label: "`lang/go` — Go"
        - label: "`lang/typescript` — TypeScript / JavaScript"
        - label: "`lang/yaml` — YAML configuration"
        - label: "`lang/json` — JSON configuration"
        - label: "`lang/bicep` — Azure Bicep"
        - label: "`lang/arm` — Azure ARM templates"
        - label: "`lang/cloudformation` — AWS CloudFormation"
        - label: "`lang/pulumi` — Pulumi programs"
        - label: "`lang/ansible` — Ansible playbooks"
        - label: "`lang/helm` — Helm charts"
        - label: "`lang/dockerfile` — Dockerfiles"
        - label: "`lang/github-workflows` — GitHub Actions YAML"
        - label: "`lang/azuredevops-pipelines` — Azure DevOps pipeline YAML"
        - label: "`lang/gitlab-ci` — GitLab CI YAML"
        - label: "`lang/jenkinsfile` — Jenkinsfile"
        - label: "`lang/markdown` — Markdown documentation"
        - label: "`lang/documentation` — Documentation standards"
        - label: "`lang/mcp` — MCP server configuration"

  - type: checkboxes
    id: platforms-csp
    attributes:
      label: "Cloud providers (platform/csp/)"
      description: "Which cloud providers does this resource target?"
      options:
        - label: "`platform/csp/aws` — Amazon Web Services"
        - label: "`platform/csp/azure` — Microsoft Azure"
        - label: "`platform/csp/gcp` — Google Cloud Platform"
        - label: "`platform/csp/oci` — Oracle Cloud Infrastructure"
        - label: "`platform/csp/alicloud` — Alibaba Cloud"
        - label: "`platform/csp/digitalocean` — DigitalOcean"
        - label: "`platform/csp/hetzner` — Hetzner Cloud"
        - label: "`platform/csp/vsphere` — VMware vSphere"

  - type: checkboxes
    id: platforms-ci
    attributes:
      label: "CI/CD platforms (platform/ci/)"
      description: "Which CI/CD platforms does this resource target?"
      options:
        - label: "`platform/ci/github-actions` — GitHub Actions"
        - label: "`platform/ci/azure-devops` — Azure DevOps Pipelines"
        - label: "`platform/ci/gitlab-ci` — GitLab CI/CD"
        - label: "`platform/ci/jenkins` — Jenkins"
        - label: "`platform/ci/circleci` — CircleCI"
        - label: "`platform/ci/teamcity` — JetBrains TeamCity"
        - label: "`platform/ci/bitbucket` — Bitbucket Pipelines"

  - type: checkboxes
    id: platforms-saas
    attributes:
      label: "SaaS platforms (platform/saas/)"
      description: "Which SaaS platforms does this resource target? Selecting a SaaS platform ensures its specific configurations are loaded into the plugin."
      options:
        - label: "`platform/saas/terraform-cloud` — Terraform Cloud / HCP Terraform"
        - label: "`platform/saas/hcp-vault` — HashiCorp Vault Cloud"
        - label: "`platform/saas/hcp-consul` — HashiCorp Consul"
        - label: "`platform/saas/hcp-boundary` — HashiCorp Boundary"
        - label: "`platform/saas/datadog` — Datadog"
        - label: "`platform/saas/pagerduty` — PagerDuty"
        - label: "`platform/saas/grafana-cloud` — Grafana Cloud"
        - label: "`platform/saas/newrelic` — New Relic"
        - label: "`platform/saas/snyk` — Snyk security scanning"
        - label: "`platform/saas/sonarcloud` — SonarCloud"
        - label: "`platform/saas/cloudflare` — Cloudflare"

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What does this resource do?
      placeholder: "Describes how to run terraform plan and summarise the output..."
    validations:
      required: true

  - type: textarea
    id: raw-content
    attributes:
      label: Raw content (optional)
      description: Paste the raw skill/agent/hook content if available (SKILL.md, CLAUDE.md, etc.)
      render: markdown

  - type: checkboxes
    id: quality
    attributes:
      label: Quality indicators
      options:
        - label: Has clear usage instructions
        - label: Includes examples
        - label: Mentions error handling
        - label: Platform-specific (not just generic text)
        - label: Has a license
        - label: Actively maintained

  - type: textarea
    id: notes
    attributes:
      label: Additional notes
      description: Anything else relevant about this resource?
